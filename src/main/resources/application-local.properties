spring.config.activate.on-profile=local
server.port=8080

# DataSource setting (MariaDB)
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://127.0.0.1:3306/knowra_user?rewriteBatchedStatements=true
spring.datasource.username=root
spring.datasource.password=root

#JPA setting
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.generate-ddl=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Upload Path
File.Store.Path=C:/home/upload

#Page config
Globals.pageUnit=10
Globals.pageSize=10

spring.thymeleaf.cache=false

# JWT
jwt.secret=knowra-secret-key-must-be-at-least-32-characters-long
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=604800000

